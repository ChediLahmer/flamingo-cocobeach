services:
  traefik:
    image: traefik:v3
    container_name: flamingo-traefik
    restart: always
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=900s"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  db:
    image: postgres:16-alpine
    container_name: flamingo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: flamingo-storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      # Admin uploads come from the main origin (admin is served at /admin),
      # so allow that origin for any cross-origin (e.g. presigned) PUT.
      MINIO_API_CORS_ALLOW_ORIGIN: https://${DOMAIN},https://www.${DOMAIN}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=Host(`storage.${DOMAIN}`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls.certresolver=letsencrypt"
      - "traefik.http.services.storage.loadbalancer.server.port=9000"
      # Direct (non-CDN) upload host for presigned PUTs: bypasses Cloudflare's
      # 100s timeout / 100MB cap. DNS for upload.${DOMAIN} must be grey-clouded
      # (DNS only). Reuses the same MinIO backend service.
      - "traefik.http.routers.upload.rule=Host(`upload.${DOMAIN}`)"
      - "traefik.http.routers.upload.entrypoints=websecure"
      - "traefik.http.routers.upload.tls.certresolver=letsencrypt"
      - "traefik.http.routers.upload.service=storage"
      # REQUIRED because this service is on >1 network, else Traefik 504s.
      - "traefik.docker.network=flamingo_web"
    networks:
      - internal
      - web

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flamingo-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Served/stored media URLs come from the CDN host (orange-clouded).
      S3_PUBLIC_URL: https://storage.${DOMAIN}
      # Presigned PUTs are signed for this host (grey-clouded, no CF limits).
      S3_UPLOAD_URL: https://upload.${DOMAIN}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://${DOMAIN},https://www.${DOMAIN}
      PORT: "3000"
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL}
      CLIENT_URL: https://${DOMAIN}
      ADMIN_URL: https://${DOMAIN}/admin
      # Used once by `prisma/seed.js` to create the first admin (see DEPLOYMENT.md).
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: flamingo-web
    restart: always
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=80"
      # nginx is on both networks (web for Traefik, internal to reach backend).
      - "traefik.docker.network=flamingo_web"
    networks:
      - internal
      - web

volumes:
  pgdata:
  miniodata:
  letsencrypt:

networks:
  web:
    name: flamingo_web
    driver: bridge
  internal:
    name: flamingo_internal
    driver: bridge

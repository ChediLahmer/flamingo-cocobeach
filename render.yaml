# ─────────────────────────────────────────────────────────────
# Flamingo CocoBeach UAT – Render Blueprint
# ─────────────────────────────────────────────────────────────
# Project: Flamingo CocoBeach UAT
# Bucket: same S3 endpoint as Ilot CocoBeach, container = "flamingo"
# ─────────────────────────────────────────────────────────────

services:
  # ─── Backend API ────────────────────────────────────────
  - type: web
    name: flamingo-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: rm -f package-lock.json && npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: CHANGE_ME
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: CHANGE_ME
      - key: S3_ENDPOINT
        value: CHANGE_ME
      - key: S3_ACCESS_KEY
        value: CHANGE_ME
      - key: S3_SECRET_KEY
        value: CHANGE_ME
      - key: S3_BUCKET
        value: flamingo
      - key: S3_PUBLIC_URL
        value: CHANGE_ME
      - key: NODE_ENV
        value: production
      - key: REQUEST_TIMEOUT_MS
        value: "600000"
      - key: CONNECTION_TIMEOUT_MS
        value: "600000"
      - key: NODE_VERSION
        value: "20.19.0"
      - key: BREVO_API_KEY
        value: CHANGE_ME
      - key: BREVO_SENDER_EMAIL
        value: noreply@flamingo-cocobeach.com
      - key: ADMIN_URL
        value: CHANGE_ME

  # ─── Client (public website) ────────────────────────────
  - type: web
    name: flamingo-client
    runtime: static
    rootDir: client
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /api/*
        destination: https://flamingo-api-5o24.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"

  # ─── Admin panel ────────────────────────────────────────
  - type: web
    name: flamingo-admin
    runtime: static
    rootDir: admin
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /api/*
        destination: https://flamingo-api-5o24.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
